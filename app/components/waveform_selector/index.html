<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #0b1220;
      color: #e5eef8;
      overflow: hidden;
    }
    .wrap {
      border: 1px solid #22314d;
      border-radius: 10px;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      padding: 10px 10px 8px;
      user-select: none;
      touch-action: pan-y;
    }
    canvas {
      display: block;
      width: 100%;
      height: 250px;
      border-radius: 8px;
      background: #0b1220;
      cursor: crosshair;
      touch-action: none;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding-top: 8px;
      font-size: 13px;
      color: #cbd5e1;
      flex-wrap: wrap;
    }
    .pill {
      border: 1px solid #2d3d5f;
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(15, 23, 42, 0.8);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="waveform"></canvas>
    <div class="meta">
      <span class="pill" id="startLabel">Start 0:00</span>
      <span class="pill" id="endLabel">End 0:00</span>
      <span class="pill" id="durationLabel">Duration 0:00</span>
    </div>
  </div>
  <script>
    const canvas = document.getElementById("waveform");
    const ctx = canvas.getContext("2d");
    const startLabel = document.getElementById("startLabel");
    const endLabel = document.getElementById("endLabel");
    const durationLabel = document.getElementById("durationLabel");

    let args = {points: [], duration: 0, start: 0, end: 1};
    let start = 0;
    let end = 1;
    let dragging = null;
    let dragOffset = 0;
    let regionDuration = 1;
    let pointerDownX = 0;
    const minGap = 0.1;

    function send(type, value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type,
        ...value
      }, "*");
    }

    function setComponentValue(value) {
      send("streamlit:setComponentValue", {value});
    }

    function setFrameHeight() {
      send("streamlit:setFrameHeight", {height: document.body.scrollHeight});
    }

    function componentReady() {
      send("streamlit:componentReady", {apiVersion: 1});
      setFrameHeight();
    }

    function fmt(seconds) {
      seconds = Math.max(0, Number(seconds) || 0);
      const m = Math.floor(seconds / 60);
      const s = seconds - m * 60;
      return `${m}:${s.toFixed(1).padStart(4, "0")}`;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function xToTime(x) {
      const rect = canvas.getBoundingClientRect();
      return clamp(((x - rect.left) / Math.max(1, rect.width)) * args.duration, 0, args.duration);
    }

    function timeToX(t) {
      return (clamp(t, 0, args.duration) / Math.max(0.001, args.duration)) * canvas.width;
    }

    function syncLabels() {
      startLabel.textContent = `Start ${fmt(start)}`;
      endLabel.textContent = `End ${fmt(end)}`;
      durationLabel.textContent = `Duration ${fmt(end - start)}`;
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.floor(rect.width * dpr));
      const height = Math.max(220, Math.floor(250 * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#0b1220";
      ctx.fillRect(0, 0, width, height);

      const rulerH = 34 * dpr;
      const waveTop = 12 * dpr;
      const waveBottom = height - rulerH - 8 * dpr;
      const baseY = (waveTop + waveBottom) / 2;
      const usableH = (waveBottom - waveTop) * 0.46;
      const points = Array.isArray(args.points) ? args.points : [];
      const barW = Math.max(1, width / Math.max(1, points.length));

      ctx.fillStyle = "#38bdf8";
      for (let i = 0; i < points.length; i++) {
        const amp = clamp(Number(points[i]) || 0, 0, 1);
        const h = Math.max(1 * dpr, amp * usableH);
        ctx.globalAlpha = 0.75;
        ctx.fillRect(i * barW, baseY - h, Math.max(1, barW * 0.82), h * 2);
      }
      ctx.globalAlpha = 1;

      const sx = timeToX(start);
      const ex = timeToX(end);
      ctx.fillStyle = "rgba(34, 197, 94, 0.26)";
      ctx.fillRect(sx, waveTop, Math.max(0, ex - sx), waveBottom - waveTop);
      ctx.strokeStyle = "rgba(34, 197, 94, 0.9)";
      ctx.lineWidth = 2 * dpr;
      ctx.strokeRect(sx, waveTop, Math.max(0, ex - sx), waveBottom - waveTop);

      drawHandle(sx, "#f8fafc", dpr, waveTop, waveBottom);
      drawHandle(ex, "#f8fafc", dpr, waveTop, waveBottom);

      ctx.strokeStyle = "#334155";
      ctx.fillStyle = "#b7c5d5";
      ctx.lineWidth = 1 * dpr;
      ctx.font = `${12 * dpr}px Arial`;
      const step = args.duration <= 180 ? 15 : 30;
      for (let t = 0; t <= args.duration + 0.01; t += step) {
        const x = timeToX(t);
        ctx.beginPath();
        ctx.moveTo(x, height - rulerH + 4 * dpr);
        ctx.lineTo(x, height - rulerH + 14 * dpr);
        ctx.stroke();
        ctx.fillText(fmt(t).slice(0, 5), x + 3 * dpr, height - 8 * dpr);
      }
      syncLabels();
    }

    function drawHandle(x, color, dpr, top, bottom) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3 * dpr;
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.roundRect(x - 10 * dpr, top + 8 * dpr, 20 * dpr, 42 * dpr, 8 * dpr);
      ctx.fill();
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(x - 3 * dpr, top + 18 * dpr, 2 * dpr, 22 * dpr);
      ctx.fillRect(x + 3 * dpr, top + 18 * dpr, 2 * dpr, 22 * dpr);
    }

    function emit(status) {
      setComponentValue({
        start: Number(start.toFixed(3)),
        end: Number(end.toFixed(3)),
        duration: Number((end - start).toFixed(3)),
        status
      });
    }

    function chooseDragMode(x) {
      const sx = timeToX(start) / (window.devicePixelRatio || 1);
      const ex = timeToX(end) / (window.devicePixelRatio || 1);
      const threshold = 22;
      if (Math.abs(x - sx) <= threshold) return "start";
      if (Math.abs(x - ex) <= threshold) return "end";
      if (x > sx && x < ex) return "region";
      return "new";
    }

    function onPointerDown(event) {
      if (!args.duration) return;
      canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const t = xToTime(event.clientX);
      pointerDownX = x;
      dragging = chooseDragMode(x);
      regionDuration = end - start;
      if (dragging === "start") {
        dragOffset = t - start;
      } else if (dragging === "end") {
        dragOffset = t - end;
      } else if (dragging === "region") {
        dragOffset = t - start;
      } else {
        start = t;
        end = clamp(t + minGap, 0, args.duration);
        dragging = "new";
      }
      draw();
      emit("Dragging");
    }

    function onPointerMove(event) {
      if (!dragging) return;
      event.preventDefault();
      const t = xToTime(event.clientX);
      if (dragging === "start") {
        start = clamp(t - dragOffset, 0, end - minGap);
      } else if (dragging === "end") {
        end = clamp(t - dragOffset, start + minGap, args.duration);
      } else if (dragging === "region") {
        const nextStart = clamp(t - dragOffset, 0, Math.max(0, args.duration - regionDuration));
        start = nextStart;
        end = clamp(nextStart + regionDuration, minGap, args.duration);
      } else if (dragging === "new") {
        const anchor = xToTime(pointerDownX + canvas.getBoundingClientRect().left);
        start = Math.min(anchor, t);
        end = Math.max(anchor + minGap, t);
        start = clamp(start, 0, args.duration - minGap);
        end = clamp(end, start + minGap, args.duration);
      }
      draw();
      emit("Dragging");
    }

    function onPointerUp(event) {
      if (!dragging) return;
      event.preventDefault();
      dragging = null;
      draw();
      emit("Manually Adjusted");
    }

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);
    window.addEventListener("resize", () => { draw(); setFrameHeight(); });

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "streamlit:render") return;
      args = event.data.args || {};
      start = clamp(Number(args.start) || 0, 0, Number(args.duration) || 0);
      end = clamp(Number(args.end) || Math.min((Number(args.duration) || 0), start + 1), start + minGap, Number(args.duration) || start + minGap);
      draw();
      setFrameHeight();
    });

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
      };
    }

    componentReady();
  </script>
</body>
</html>
